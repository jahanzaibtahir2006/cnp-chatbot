<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNP AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --purple:      #6b21a8;
    --purple-dark: #4a0e7a;
    --purple-mid:  #7c3aed;
    --pink:        #c026a0;
    --pink-light:  #e879d4;
    --gold:        #f5c842;
    --gold-dark:   #d4a017;
    --purple-pale: #f3e8ff;
    --cream:       #fdf8ff;
    --white:       #ffffff;
    --charcoal:    #1e1033;
    --muted:       #7c6a9a;
    --shadow:      0 24px 64px rgba(107,33,168,0.22);
    --radius:      18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Source Sans 3', sans-serif; background: transparent; }

  /* ── Animated Bubble ── */
  #cnp-bubble {
    position: fixed;
    bottom: 36px;
    right: 102px;
    background: white;
    border-radius: 20px 20px 4px 20px;
    padding: 10px 16px;
    box-shadow: 0 8px 32px rgba(107,33,168,0.2);
    border: 1.5px solid rgba(107,33,168,0.15);
    z-index: 9998;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: bubble-in 0.6s cubic-bezier(.34,1.56,.64,1) forwards, bubble-wiggle 0.6s ease-in-out 1.2s 1;
    cursor: pointer;
    max-width: 220px;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  #cnp-bubble:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(107,33,168,0.28); }
  #cnp-bubble.bubble-hide {
    animation: bubble-out 0.3s ease forwards;
    pointer-events: none;
  }
  @keyframes bubble-in {
    from { opacity: 0; transform: translateX(20px) scale(0.85); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }
  @keyframes bubble-out {
    from { opacity: 1; transform: translateX(0) scale(1); }
    to   { opacity: 0; transform: translateX(20px) scale(0.85); }
  }
  @keyframes bubble-wiggle {
    0%   { transform: translateX(0) rotate(0deg); }
    15%  { transform: translateX(-4px) rotate(-2deg); }
    30%  { transform: translateX(4px) rotate(2deg); }
    45%  { transform: translateX(-3px) rotate(-1.5deg); }
    60%  { transform: translateX(3px) rotate(1.5deg); }
    75%  { transform: translateX(-2px) rotate(-1deg); }
    90%  { transform: translateX(2px) rotate(1deg); }
    100% { transform: translateX(0) rotate(0deg); }
  }
  .bubble-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #7fff7f; flex-shrink: 0;
    animation: blink 2.2s ease-in-out infinite;
  }
  .bubble-text {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px; font-weight: 500; color: #4a0e7a; line-height: 1.3;
  }
  .bubble-text span {
    display: block; font-size: 11px; color: #7c6a9a; font-weight: 400; margin-top: 1px;
  }
  #cnp-bubble-close {
    position: absolute; top: -6px; right: -6px;
    width: 18px; height: 18px; border-radius: 50%;
    background: #e879d4; border: none; color: white;
    font-size: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1; padding: 0;
  }
  #cnp-bubble::after {
    content: ''; position: absolute; bottom: 10px; right: -8px;
    width: 0; height: 0;
    border-top: 8px solid transparent;
    border-bottom: 0px solid transparent;
    border-left: 8px solid white;
  }

  /* ── Toggle Button ── */
  #cnp-toggle {
    position: fixed; bottom: 28px; right: 28px;
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(145deg, var(--purple), var(--pink));
    border: none; cursor: pointer;
    box-shadow: 0 8px 32px rgba(107,33,168,0.45);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
    z-index: 9999; overflow: visible;
    animation: btn-entrance 0.7s cubic-bezier(.34,1.56,.64,1) forwards, btn-attention 4s ease-in-out 3s infinite;
  }
  #cnp-toggle:hover {
    transform: scale(1.12);
    box-shadow: 0 16px 44px rgba(192,38,160,0.6);
    animation: none;
  }
  #cnp-toggle::before, #cnp-toggle::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid rgba(232,121,212,0.7);
    animation: ripple 2.8s ease-out infinite; opacity: 0;
    pointer-events: none;
  }
  #cnp-toggle::after {
    border-color: rgba(107,33,168,0.5);
    animation: ripple 2.8s ease-out 1.4s infinite;
  }
  #cnp-toggle.open::before, #cnp-toggle.open::after { animation: none; opacity: 0; }
  @keyframes btn-entrance {
    0%   { opacity: 0; transform: scale(0) rotate(-180deg); }
    70%  { transform: scale(1.15) rotate(8deg); }
    85%  { transform: scale(0.95) rotate(-4deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes btn-attention {
    0%,100% { transform: scale(1) rotate(0deg);    box-shadow: 0 8px 32px rgba(107,33,168,0.45); }
    10%     { transform: scale(1.08) rotate(-8deg); box-shadow: 0 12px 36px rgba(192,38,160,0.55); }
    20%     { transform: scale(1.08) rotate(8deg);  box-shadow: 0 12px 36px rgba(192,38,160,0.55); }
    30%     { transform: scale(1.08) rotate(-5deg); }
    40%     { transform: scale(1.08) rotate(5deg);  }
    50%     { transform: scale(1.05) rotate(0deg);  box-shadow: 0 10px 34px rgba(107,33,168,0.5); }
    60%,90% { transform: scale(1) rotate(0deg);    box-shadow: 0 8px 32px rgba(107,33,168,0.45); }
  }
  @keyframes ripple {
    0%   { transform: scale(1);   opacity: 0.65; }
    100% { transform: scale(1.9); opacity: 0; }
  }
  .chat-icon  { transition: opacity 0.25s, transform 0.25s; }
  .close-icon { position: absolute; opacity: 0; transform: rotate(-90deg) scale(0.7); transition: opacity 0.25s, transform 0.25s; }
  #cnp-toggle.open .chat-icon  { opacity: 0; transform: rotate(90deg) scale(0.7); }
  #cnp-toggle.open .close-icon { opacity: 1; transform: rotate(0deg) scale(1); }

  /* ── Chat Window ── */
  #cnp-chat {
    position: fixed; bottom: 106px; right: 28px;
    width: 385px; max-width: calc(100vw - 40px);
    height: 480px; max-height: calc(100vh - 120px);
    background: var(--cream); border-radius: var(--radius);
    box-shadow: var(--shadow); display: flex; flex-direction: column;
    overflow: hidden; z-index: 9998;
    opacity: 0; transform: translateY(18px) scale(0.97); pointer-events: none;
    transition: opacity .32s cubic-bezier(.4,0,.2,1), transform .38s cubic-bezier(.34,1.56,.64,1);
    border: 1px solid rgba(107,33,168,0.12);
    font-family: 'Source Sans 3', sans-serif;
  }
  #cnp-chat.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }

  /* ── Header ── */
  .chat-header {
    background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple) 50%, var(--pink) 100%);
    padding: 16px 18px 0; color: var(--white); flex-shrink: 0;
    position: relative; overflow: hidden;
  }
  .chat-header::before {
    content: ''; position: absolute; top: -50px; right: -50px;
    width: 160px; height: 160px; border-radius: 50%;
    background: rgba(245,200,66,0.08);
  }
  .header-top { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
  .logo-wrap {
    width: 46px; height: 46px; border-radius: 10px;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(245,200,66,0.5);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .logo-wrap img { width: 38px; height: 38px; object-fit: contain; }
  .header-info h3 { font-family: 'Lora', serif; font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  .header-info .tagline { font-size: 11px; opacity: .75; margin-top: 2px; font-weight: 300; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(245,200,66,0.35);
    border-radius: 20px; padding: 4px 10px;
    font-size: 11px; font-weight: 500;
    margin-top: 10px; position: relative; z-index: 1;
  }
  .status-dot { width:6px; height:6px; border-radius:50%; background:#7fff7f; animation:blink 2.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .gold-bar { height:3px; background:linear-gradient(90deg,transparent,var(--gold),var(--gold-dark),transparent); margin-top:12px; }

  /* ── Messages ── */
  .chat-messages {
    flex:1; overflow-y:auto; padding:16px 14px;
    display:flex; flex-direction:column; gap:11px; scroll-behavior:smooth;
  }
  .chat-messages::-webkit-scrollbar{width:4px}
  .chat-messages::-webkit-scrollbar-thumb{background:#d8b4fe;border-radius:2px}
  .msg { display:flex; gap:8px; animation:msgIn .28s cubic-bezier(.34,1.56,.64,1); }
  @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{flex-direction:row-reverse}
  .msg-avatar {
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; margin-top:2px; overflow:hidden; font-size:10px; font-weight:700;
  }
  .msg.bot .msg-avatar { background:var(--purple-pale); border:1.5px solid rgba(107,33,168,.2); padding:3px; }
  .msg.bot .msg-avatar img { width:100%; height:100%; object-fit:contain; }
  .msg.user .msg-avatar { background:linear-gradient(135deg,var(--purple),var(--pink)); color:white; }
  .msg-col { display:flex; flex-direction:column; max-width:90%; }
  .msg.user .msg-col { align-items:flex-end; }
  .msg-bubble { padding:10px 13px; border-radius:14px; font-size:13.5px; line-height:1.58; color:var(--charcoal); }
  .msg.bot  .msg-bubble { background:var(--white); border-radius:4px 14px 14px 14px; box-shadow:0 2px 10px rgba(107,33,168,.1); border:1px solid rgba(107,33,168,.08); }
  .msg.user .msg-bubble { background:linear-gradient(135deg,var(--purple),var(--pink)); color:var(--white); border-radius:14px 4px 14px 14px; }
  .msg-time { font-size:10px; color:var(--muted); margin-top:3px; padding:0 4px; }
  .msg-bubble ul { padding-left:18px; margin:0; list-style:disc; }
  .msg-bubble ol { padding-left:18px; margin:0; list-style:decimal; }
  .msg-bubble li { margin:0; line-height:1.5; }
  .msg-bubble strong { font-weight:600; color:var(--purple-dark); }
  .msg.user .msg-bubble strong { color:#fff; }
  .msg-bubble a { color:var(--purple); text-decoration:underline; }
  .msg.user .msg-bubble a { color:var(--gold); }

  /* ── Course Series Buttons ── */
  .series-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .series-btn {
    background:linear-gradient(135deg,#f3e8ff,#fdf8ff);
    border:1.5px solid rgba(107,33,168,0.25); border-radius:12px;
    padding:12px 10px; cursor:pointer;
    font-family:'Source Sans 3',sans-serif; font-size:12px; font-weight:600;
    color:#4a0e7a; text-align:center; transition:all 0.2s; line-height:1.4;
  }
  .series-btn:hover { background:linear-gradient(135deg,#6b21a8,#c026a0); color:#fff; border-color:transparent; transform:translateY(-2px); box-shadow:0 4px 14px rgba(107,33,168,0.3); }
  .series-sublabel { display:block; font-size:10px; font-weight:400; opacity:0.7; margin-top:3px; }

  /* Typing */
  .typing-dots{display:flex;align-items:center;gap:4px;padding:4px 2px}
  .typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--pink-light);animation:bounce 1.3s ease-in-out infinite}
  .typing-dots span:nth-child(2){animation-delay:.16s}
  .typing-dots span:nth-child(3){animation-delay:.32s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

  /* Quick Replies */
  .quick-replies { display:flex; flex-wrap:wrap; gap:6px; padding:2px 14px 10px; }
  .quick-btn {
    background:var(--white); border:1.5px solid rgba(107,33,168,.25);
    color:var(--purple); border-radius:20px; padding:5px 12px;
    font-size:12px; font-family:'Source Sans 3',sans-serif;
    cursor:pointer; font-weight:500; transition:all .2s;
  }
  .quick-btn:hover { background:linear-gradient(135deg,var(--purple),var(--pink)); color:white; border-color:transparent; transform:translateY(-1px); }

  /* Input */
  .chat-input-area { padding:10px 14px 14px; background:var(--white); border-top:1px solid rgba(107,33,168,.1); flex-shrink:0; }
  .input-row {
    display:flex; align-items:flex-end; gap:8px;
    background:var(--cream); border:1.5px solid rgba(107,33,168,.2);
    border-radius:12px; padding:8px 8px 8px 14px;
    transition:border-color .2s,box-shadow .2s;
  }
  .input-row:focus-within { border-color:var(--purple-mid); box-shadow:0 0 0 3px rgba(124,58,237,.1); }
  #cnp-input {
    flex:1; border:none; background:transparent;
    font-family:'Source Sans 3',sans-serif; font-size:13.5px;
    color:var(--charcoal); resize:none; outline:none;
    max-height:88px; min-height:22px; line-height:1.5;
  }
  #cnp-input::placeholder { color:#c4a8e0; }
  #cnp-send {
    width:36px; height:36px; border-radius:9px;
    background:linear-gradient(135deg,var(--purple),var(--pink));
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:transform .2s,box-shadow .2s,opacity .2s;
  }
  #cnp-send:hover { transform:scale(1.08); box-shadow:0 4px 14px rgba(192,38,160,.45); }
  #cnp-send:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }
  .footer-bar { display:flex; align-items:center; justify-content:center; gap:5px; margin-top:7px; }
  .powered-by { font-size:10px; color:#b09cc8; letter-spacing:.3px; }
  .footer-dot { width:3px; height:3px; border-radius:50%; background:#d8b4fe; }

  @media(max-width:480px){
    #cnp-chat { right:10px; bottom:88px; width:calc(100vw - 20px); }
    #cnp-toggle { right:14px; bottom:14px; }
    #cnp-bubble { right:90px; bottom:30px; max-width:180px; }
  }
</style>
</head>
<body>

<!-- Bubble Popup -->
<div id="cnp-bubble">
  <button id="cnp-bubble-close">✕</button>
  <div class="bubble-dot"></div>
  <div class="bubble-text">
    💬 Ask CNP Assistant
    <span>Nutrition & Mental Health AI</span>
  </div>
</div>

<!-- Toggle Button -->
<button id="cnp-toggle" aria-label="Open CNP chat">
  <svg class="chat-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg class="close-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<!-- Chat Window -->
<div id="cnp-chat" role="dialog" aria-label="CNP AI Assistant">
  <div class="chat-header">
    <div class="header-top">
      <div class="logo-wrap">
        <img src="https://www.nutritional-psychology.org/wp-content/uploads/2022/04/cnp-logo.png"
             alt="CNP Logo"
             onerror="this.style.display='none';this.parentNode.innerHTML='<span style=\"font-size:22px\">🧠</span>'"/>
      </div>
      <div class="header-info">
        <h3>CNP AI Assistant</h3>
        <div class="tagline">Center for Nutritional Psychology</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span>Online · Ready to help</span>
    </div>
    <div class="gold-bar"></div>
  </div>

  <div class="chat-messages" id="cnp-messages"></div>
  <div class="quick-replies" id="cnp-quick"></div>

  <div class="chat-input-area">
    <div class="input-row">
      <textarea id="cnp-input" placeholder="Ask about nutrition & mental health..." rows="1"></textarea>
      <button id="cnp-send" aria-label="Send">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="footer-bar">
      <span class="powered-by">Powered by AI</span>
      <div class="footer-dot"></div>
      <span class="powered-by">nutritional-psychology.org</span>
    </div>
  </div>
</div>

<script>
  const WEBHOOK_URL = 'https://jahanworkspace.app.n8n.cloud/webhook/185d65c5-4a4d-4b2e-9ce2-3e3282a971b4/chat';
  const LOGO = 'https://www.nutritional-psychology.org/wp-content/uploads/2022/04/cnp-logo.png';

  // ── Random Quick Questions Pool ──
  const ALL_QUESTIONS = [
    'What is nutritional psychology?',
    'How can I join CNP?',
    'What courses do you offer?',
    'Tell me about CNP research',
    'What is the gut-brain connection?',
    'How does diet affect mood?',
    'Who founded CNP?',
    'What are CNP scholarships?',
    'What is the NP 110 course?',
    'How does nutrition affect mental health?'
  ];
  function getRandomQuestions(n) {
    const shuffled = [...ALL_QUESTIONS].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, n);
  }

  // ── Course Series Data ──
  const COURSE_SERIES = {
    'NP 100 Series': {
      label: 'NP 100 Series', sublabel: 'Introductory Certificate',
      courses: [
        { name: 'NP 110: Introduction to Nutritional Psychology Methods', url: 'https://www.nutritional-psychology.org/education/np-110/' },
        { name: 'NP 120 Part I: Microbes in our Gut', url: 'https://www.nutritional-psychology.org/np-120/np-120-part-1/' },
        { name: 'NP 120 Part II: The Gut Microbiota and Mental Health', url: 'https://www.nutritional-psychology.org/np-120/np-120-part-2/' },
        { name: 'NP 150 Part I: Mechanisms in the Diet-Mental Health Relationship', url: 'https://www.nutritional-psychology.org/education/np-150-part-1/' },
        { name: 'NP 150 Part II: Mechanisms in the DMHR (Continued)', url: 'https://www.nutritional-psychology.org/np-150/np-150-part-2/' },
      ]
    },
    'NP 300 Series': {
      label: 'NP 300 Series', sublabel: 'Advanced Certificate',
      courses: [
        { name: 'NP 300', url: 'https://www.nutritional-psychology.org/np-300/' },
        { name: 'NP 310', url: 'https://www.nutritional-psychology.org/np-310/' },
        { name: 'NP 320', url: 'https://www.nutritional-psychology.org/np-320/' },
      ]
    },
    'NP 500 Series': {
      label: 'NP 500 Series', sublabel: 'Professional Development',
      courses: [
        { name: 'NP 500', url: 'https://www.nutritional-psychology.org/np-500/' },
        { name: 'NP 510', url: 'https://www.nutritional-psychology.org/np-510/' },
      ]
    },
    'Special Programs': {
      label: 'Special Programs', sublabel: 'Micro-Degree & More',
      courses: [
        { name: 'NP-FMA Micro-Degree in Nutritional Psychology', url: 'https://www.nutritional-psychology.org/micro-degree/' },
      ]
    }
  };

  // ── Session ID ──
  const sessionId = sessionStorage.getItem('cnp_session') || (() => {
    const id = 'cnp_' + Math.random().toString(36).substr(2,10) + '_' + Date.now();
    sessionStorage.setItem('cnp_session', id);
    return id;
  })();

  const toggle  = document.getElementById('cnp-toggle');
  const chat    = document.getElementById('cnp-chat');
  const msgs    = document.getElementById('cnp-messages');
  const input   = document.getElementById('cnp-input');
  const sendBtn = document.getElementById('cnp-send');
  const quickDiv = document.getElementById('cnp-quick');
  const bubble  = document.getElementById('cnp-bubble');
  let isOpen = false;
  let quickShown = true;

  // ── Render random quick questions on load ──
  getRandomQuestions(4).forEach(q => {
    const b = document.createElement('button');
    b.className = 'quick-btn';
    b.textContent = q;
    b.onclick = () => sendQuick(q);
    quickDiv.appendChild(b);
  });

  // ── Welcome message ──
  addMessage('bot', "Hello! 👋 I'm the **CNP AI Assistant**. I can help you explore nutritional psychology, our courses, research, membership, and more.\n\nWhat would you like to know today?");

  // ── Bubble logic ──
  document.getElementById('cnp-bubble-close').onclick = function(e) {
    e.stopPropagation();
    bubble.classList.add('bubble-hide');
    setTimeout(() => bubble.style.display = 'none', 300);
  };
  bubble.onclick = function() {
    openChat();
    bubble.classList.add('bubble-hide');
    setTimeout(() => bubble.style.display = 'none', 300);
  };
  setTimeout(() => {
    if (bubble.style.display !== 'none') {
      bubble.classList.add('bubble-hide');
      setTimeout(() => bubble.style.display = 'none', 300);
    }
  }, 8000);

  // ── Toggle button ──
  toggle.addEventListener('click', () => {
    isOpen = !isOpen;
    chat.classList.toggle('visible', isOpen);
    toggle.classList.toggle('open', isOpen);
    if (isOpen) {
      toggle.style.animation = 'none';
      bubble.classList.add('bubble-hide');
      setTimeout(() => bubble.style.display = 'none', 300);
      setTimeout(() => input.focus(), 300);
    }
  });

  function openChat() {
    isOpen = true;
    chat.classList.add('visible');
    toggle.classList.add('open');
    toggle.style.animation = 'none';
    setTimeout(() => input.focus(), 300);
  }

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 88) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  function sendQuick(text) {
    quickDiv.style.display = 'none';
    quickShown = false;
    input.value = text;
    sendMessage();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;
    if (quickShown) { quickDiv.style.display = 'none'; quickShown = false; }
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    const typingId = addTyping();
    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'sendMessage', sessionId, chatInput: text })
      });
      removeTyping(typingId);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const reply = data.output || data.text || data.message || data.response ||
        (Array.isArray(data) && (data[0]?.output || data[0]?.text)) ||
        'I apologize, I could not process your request.';
      if (reply.trim().includes('SHOW_COURSES')) {
        showCourseSeriesButtons();
      } else {
        addMessage('bot', reply);
      }
    } catch(err) {
      removeTyping(typingId);
      addMessage('bot', '⚠️ Connection issue. Please try again.');
    }
    sendBtn.disabled = false;
    input.focus();
  }

  function showCourseSeriesButtons() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.innerHTML = `<img src="${LOGO}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentNode.textContent='🧠'"/>`;
    const col = document.createElement('div');
    col.className = 'msg-col';
    const bub = document.createElement('div');
    bub.className = 'msg-bubble';
    bub.innerHTML = '<strong>CNP Courses</strong><br>CNP offers 10 courses across 3 series plus special programs.<br>Select a series to explore:';
    const grid = document.createElement('div');
    grid.className = 'series-grid';
    Object.keys(COURSE_SERIES).forEach(seriesName => {
      const s = COURSE_SERIES[seriesName];
      const btn = document.createElement('button');
      btn.className = 'series-btn';
      btn.innerHTML = s.label + '<span class="series-sublabel">' + s.sublabel + '</span>';
      btn.onclick = () => showSeriesCourses(seriesName);
      grid.appendChild(btn);
    });
    bub.appendChild(grid);
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    col.appendChild(bub); col.appendChild(time);
    wrap.appendChild(avatar); wrap.appendChild(col);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showSeriesCourses(seriesName) {
    const series = COURSE_SERIES[seriesName];
    addMessage('user', seriesName);
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.innerHTML = `<img src="${LOGO}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentNode.textContent='🧠'"/>`;
    const col = document.createElement('div');
    col.className = 'msg-col';
    const bub = document.createElement('div');
    bub.className = 'msg-bubble';
    let html = '<strong>' + seriesName + '</strong><br><ul>';
    series.courses.forEach(c => {
      html += '<li><a href="' + c.url + '" target="_blank">' + c.name + '</a></li>';
    });
    html += '</ul><br><a href="https://www.nutritional-psychology.org/courses" target="_blank">View All CNP Courses</a>';
    bub.innerHTML = html;
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    col.appendChild(bub); col.appendChild(time);
    wrap.appendChild(avatar); wrap.appendChild(col);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function formatText(text) {
    if (/<[a-z][\s\S]*>/i.test(text)) {
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
      text = text.replace(/\n/g, '<br>');
      return text;
    }
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
    const lines = text.split('\n');
    const html = [];
    let inUL = false, inOL = false;
    lines.forEach(line => {
      const ulMatch = line.match(/^[\-\•]\s+(.+)/);
      const olMatch = line.match(/^\d+[\.\)]\s+(.+)/);
      if (ulMatch) {
        if (inOL) { html.push('</ol>'); inOL = false; }
        if (!inUL) { html.push('<ul>'); inUL = true; }
        html.push('<li>' + ulMatch[1] + '</li>');
      } else if (olMatch) {
        if (inUL) { html.push('</ul>'); inUL = false; }
        if (!inOL) { html.push('<ol>'); inOL = true; }
        html.push('<li>' + olMatch[1] + '</li>');
      } else {
        if (inUL) { html.push('</ul>'); inUL = false; }
        if (inOL) { html.push('</ol>'); inOL = false; }
        html.push(line.trim() === '' ? '<br>' : line + '<br>');
      }
    });
    if (inUL) html.push('</ul>');
    if (inOL) html.push('</ol>');
    return html.join('');
  }

  function addMessage(role, text) {
    const isBot = role === 'bot';
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.innerHTML = isBot
      ? `<img src="${LOGO}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentNode.textContent='🧠'"/>`
      : 'You';
    const col = document.createElement('div');
    col.className = 'msg-col';
    const bub = document.createElement('div');
    bub.className = 'msg-bubble';
    bub.innerHTML = formatText(text);
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    col.appendChild(bub); col.appendChild(time);
    wrap.appendChild(avatar); wrap.appendChild(col);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const id = 'typing_' + Date.now();
    const wrap = document.createElement('div');
    wrap.className = 'msg bot'; wrap.id = id;
    wrap.innerHTML = `<div class="msg-avatar"><img src="${LOGO}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentNode.textContent='🧠'"/></div><div class="msg-bubble" style="padding:12px 16px;"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }
</script>
