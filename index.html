<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNP AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --purple:      #6b21a8;
    --purple-dark: #4a0e7a;
    --purple-mid:  #7c3aed;
    --pink:        #c026a0;
    --pink-light:  #e879d4;
    --gold:        #f5c842;
    --gold-dark:   #d4a017;
    --purple-pale: #f3e8ff;
    --cream:       #fdf8ff;
    --white:       #ffffff;
    --charcoal:    #1e1033;
    --muted:       #7c6a9a;
    --shadow:      0 24px 64px rgba(107,33,168,0.22);
    --radius:      18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Source Sans 3', sans-serif; background: transparent; }

  /* ── Toggle Button ── */
  #cnp-toggle {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--purple), var(--pink));
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(107,33,168,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
    z-index: 9999;
    overflow: hidden;
  }
  #cnp-toggle:hover { transform: scale(1.1); box-shadow: 0 14px 40px rgba(192,38,160,0.5); }
  .chat-icon { transition: opacity 0.25s, transform 0.25s; }
  .close-icon { position: absolute; opacity: 0; transform: rotate(-90deg) scale(0.7); transition: opacity 0.25s, transform 0.25s; }
  #cnp-toggle.open .chat-icon { opacity: 0; transform: rotate(90deg) scale(0.7); }
  #cnp-toggle.open .close-icon { opacity: 1; transform: rotate(0deg) scale(1); }
  #cnp-toggle::before {
    content: ''; position: absolute; inset: -3px; border-radius: 50%;
    border: 2px solid var(--pink-light);
    animation: ripple 2.8s ease-out infinite; opacity: 0;
  }
  @keyframes ripple { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(1.6);opacity:0} }

  /* ── Chat Window ── */
  #cnp-chat {
    position: fixed; bottom: 106px; right: 28px;
    width: 385px; max-width: calc(100vw - 40px);
    height: 480px; max-height: calc(100vh - 120px);
    background: var(--cream); border-radius: var(--radius);
    box-shadow: var(--shadow); display: flex; flex-direction: column;
    overflow: hidden; z-index: 9998;
    opacity: 0; transform: translateY(18px) scale(0.97); pointer-events: none;
    transition: opacity .32s cubic-bezier(.4,0,.2,1), transform .38s cubic-bezier(.34,1.56,.64,1);
    border: 1px solid rgba(107,33,168,0.12);
  }
  #cnp-chat.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }

  /* ── Header ── */
  .chat-header {
    background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple) 50%, var(--pink) 100%);
    padding: 16px 18px 0; color: var(--white); flex-shrink: 0;
    position: relative; overflow: hidden;
  }
  .chat-header::before {
    content: ''; position: absolute; top: -50px; right: -50px;
    width: 160px; height: 160px; border-radius: 50%;
    background: rgba(245,200,66,0.08);
  }
  .header-top { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
  .logo-wrap {
    width: 46px; height: 46px; border-radius: 10px;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(245,200,66,0.5);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .logo-wrap img { width: 38px; height: 38px; object-fit: contain; }
  .header-info h3 {
    font-family: 'Lora', serif; font-size: 15px;
    font-weight: 600; letter-spacing: 0.3px;
  }
  .header-info .tagline { font-size: 11px; opacity: .75; margin-top: 2px; font-weight: 300; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(245,200,66,0.35);
    border-radius: 20px; padding: 4px 10px;
    font-size: 11px; font-weight: 500;
    margin-top: 10px; position: relative; z-index: 1;
  }
  .status-dot { width:6px;height:6px;border-radius:50%;background:#7fff7f;animation:blink 2.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .gold-bar { height:3px; background:linear-gradient(90deg,transparent,var(--gold),var(--gold-dark),transparent); margin-top:12px; }

  /* ── Messages ── */
  .chat-messages {
    flex:1; overflow-y:auto; padding:16px 14px;
    display:flex; flex-direction:column; gap:11px; scroll-behavior:smooth;
  }
  .chat-messages::-webkit-scrollbar{width:4px}
  .chat-messages::-webkit-scrollbar-thumb{background:#d8b4fe;border-radius:2px}
  .msg { display:flex; gap:8px; animation:msgIn .28s cubic-bezier(.34,1.56,.64,1); }
  @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{flex-direction:row-reverse}
  .msg-avatar {
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;margin-top:2px;overflow:hidden;
  }
  .msg.bot .msg-avatar { background:var(--purple-pale);border:1.5px solid rgba(107,33,168,.2);padding:3px; }
  .msg.bot .msg-avatar img{width:100%;height:100%;object-fit:contain}
  .msg.user .msg-avatar{background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-size:10px;font-weight:700}
  .msg-col{display:flex;flex-direction:column;max-width:80%}
  .msg.user .msg-col{align-items:flex-end}
  .msg-bubble{padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.58;color:var(--charcoal)}
  .msg.bot .msg-bubble{background:var(--white);border-radius:4px 14px 14px 14px;box-shadow:0 2px 10px rgba(107,33,168,.1);border:1px solid rgba(107,33,168,.08)}
  .msg.user .msg-bubble{background:linear-gradient(135deg,var(--purple),var(--pink));color:var(--white);border-radius:14px 4px 14px 14px}
  .msg-time{font-size:10px;color:var(--muted);margin-top:3px;padding:0 4px}

  /* Typing */
  .typing-dots{display:flex;align-items:center;gap:4px;padding:4px 2px}
  .typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--pink-light);animation:bounce 1.3s ease-in-out infinite}
  .typing-dots span:nth-child(2){animation-delay:.16s}
  .typing-dots span:nth-child(3){animation-delay:.32s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

  /* Quick Replies */
  .quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:2px 14px 10px}
  .inline-quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0 2px 38px;animation:msgIn .28s cubic-bezier(.34,1.56,.64,1)}
  .quick-btn{
    background:var(--white);border:1.5px solid rgba(107,33,168,.25);
    color:var(--purple);border-radius:20px;padding:5px 12px;
    font-size:12px;font-family:'Source Sans 3',sans-serif;
    cursor:pointer;font-weight:500;transition:all .2s;
  }
  .quick-btn:hover{background:linear-gradient(135deg,var(--purple),var(--pink));color:white;border-color:transparent;transform:translateY(-1px);box-shadow:0 4px 12px rgba(192,38,160,.3)}

  /* Input */
  .chat-input-area{padding:10px 14px 14px;background:var(--white);border-top:1px solid rgba(107,33,168,.1);flex-shrink:0}
  .input-row{
    display:flex;align-items:flex-end;gap:8px;
    background:var(--cream);border:1.5px solid rgba(107,33,168,.2);
    border-radius:12px;padding:8px 8px 8px 14px;
    transition:border-color .2s,box-shadow .2s;
  }
  .input-row:focus-within{border-color:var(--purple-mid);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
  #cnp-input{
    flex:1;border:none;background:transparent;
    font-family:'Source Sans 3',sans-serif;font-size:13.5px;
    color:var(--charcoal);resize:none;outline:none;
    max-height:88px;min-height:22px;line-height:1.5;
  }
  #cnp-input::placeholder{color:#c4a8e0}
  #cnp-send{
    width:36px;height:36px;border-radius:9px;
    background:linear-gradient(135deg,var(--purple),var(--pink));
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:transform .2s,box-shadow .2s,opacity .2s;
  }
  #cnp-send:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(192,38,160,.45)}
  #cnp-send:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
  .footer-bar{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:7px}
  .powered-by{font-size:10px;color:#b09cc8;letter-spacing:.3px}
  .footer-dot{width:3px;height:3px;border-radius:50%;background:#d8b4fe}

  @media(max-width:480px){
    #cnp-chat{right:10px;bottom:88px;width:calc(100vw - 20px)}
    #cnp-toggle{right:14px;bottom:14px}
  }
</style>
</head>
<body>

<button id="cnp-toggle" aria-label="Open CNP chat">
  <svg class="chat-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg class="close-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<div id="cnp-chat" role="dialog" aria-label="CNP AI Assistant">
  <div class="chat-header">
    <div class="header-top">
      <div class="logo-wrap">
        <img src="https://www.nutritional-psychology.org/wp-content/uploads/2022/04/cnp-logo.png"
             alt="CNP Logo"
             onerror="this.style.display='none';this.parentNode.innerHTML='<span style=\'font-size:22px\'>🧠</span>'"/>
      </div>
      <div class="header-info">
        <h3>CNP AI Assistant</h3>
        <div class="tagline">Center for Nutritional Psychology</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span>Online · Ready to help</span>
    </div>
    <div class="gold-bar"></div>
  </div>

  <div class="chat-messages" id="cnp-messages"></div>

  <div class="quick-replies" id="cnp-quick">
    <button class="quick-btn" onclick="sendQuick('What is nutritional psychology?')">What is nutritional psychology?</button>
    <button class="quick-btn" onclick="sendQuick('How can I join CNP?')">How to join CNP?</button>
    <button class="quick-btn" onclick="sendQuick('What courses do you offer?')">Courses available?</button>
    <button class="quick-btn" onclick="sendQuick('Tell me about CNP research')">CNP Research</button>
  </div>

  <div class="chat-input-area">
    <div class="input-row">
      <textarea id="cnp-input" placeholder="Ask about nutrition & mental health..." rows="1"></textarea>
      <button id="cnp-send" onclick="sendMessage()" aria-label="Send">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="footer-bar">
      <span class="powered-by">Powered by AI</span>
      <div class="footer-dot"></div>
      <span class="powered-by">nutritional-psychology.org</span>
    </div>
  </div>
</div>

<script>
  const WEBHOOK_URL = "https://jahanworkspace.app.n8n.cloud/webhook/185d65c5-4a4d-4b2e-9ce2-3e3282a971b4/chat";
  const CNP_LOGO_URL = "https://www.nutritional-psychology.org/wp-content/uploads/2022/04/cnp-logo.png";

  const sessionId = sessionStorage.getItem('cnp_session') || (() => {
    const id = 'cnp_' + Math.random().toString(36).substr(2,10) + '_' + Date.now();
    sessionStorage.setItem('cnp_session', id);
    return id;
  })();

  const toggle  = document.getElementById('cnp-toggle');
  const chat    = document.getElementById('cnp-chat');
  const msgs    = document.getElementById('cnp-messages');
  const input   = document.getElementById('cnp-input');
  const sendBtn = document.getElementById('cnp-send');
  const quick   = document.getElementById('cnp-quick');
  let isOpen = false;

  addMessage('bot', "Hello! 👋 I'm the **CNP AI Assistant**. I can help you explore nutritional psychology, our courses, research, membership, and more.\n\nWhat would you like to know today?");
  // Hide static quick replies after first bot reply — inline ones will take over

  toggle.addEventListener('click', () => {
    isOpen = !isOpen;
    chat.classList.toggle('visible', isOpen);
    toggle.classList.toggle('open', isOpen);
    if (isOpen) setTimeout(() => input.focus(), 300);
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 88) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendQuick(text) {
    quick.style.display = 'none';
    document.querySelectorAll('.inline-quick-replies').forEach(el => el.remove());
    input.value = text;
    sendMessage();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    // Remove previous inline quick replies
    document.querySelectorAll('.inline-quick-replies').forEach(el => el.remove());

    const typingId = addTyping();

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'sendMessage', sessionId, chatInput: text })
      });
      removeTyping(typingId);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const reply = data.output || data.text || data.message || data.response ||
        (Array.isArray(data) && (data[0]?.output || data[0]?.text)) ||
        'I apologize, I could not process your request. Please try again.';
      addMessage('bot', reply);
      addInlineQuickReplies();
    } catch (err) {
      removeTyping(typingId);
      addMessage('bot', '⚠️ Connection issue. Please try again in a moment.');
      console.error('CNP error:', err);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function makeAvatarHTML(isBot) {
    if (isBot) return `<img src="${CNP_LOGO_URL}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentNode.textContent='🧠'"/>`;
    return 'You';
  }

  function addMessage(role, text) {
    const isBot = role === 'bot';
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.innerHTML = makeAvatarHTML(isBot);

    const col = document.createElement('div');
    col.className = 'msg-col';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = formatText(text);

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

    col.appendChild(bubble);
    col.appendChild(time);
    wrap.appendChild(avatar);
    wrap.appendChild(col);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const id = 'typing_' + Date.now();
    const wrap = document.createElement('div');
    wrap.className = 'msg bot'; wrap.id = id;
    wrap.innerHTML = `
      <div class="msg-avatar"><img src="${CNP_LOGO_URL}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentNode.textContent='🧠'"/></div>
      <div class="msg-bubble" style="padding:12px 16px;">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function addInlineQuickReplies() {
    const div = document.createElement('div');
    div.className = 'inline-quick-replies';
    const questions = [
      'What is nutritional psychology?',
      'How can I join CNP?',
      'What courses do you offer?',
      'Tell me about CNP research'
    ];
    questions.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.textContent = q;
      btn.onclick = () => {
        document.querySelectorAll('.inline-quick-replies').forEach(el => el.remove());
        input.value = q;
        sendMessage();
      };
      div.appendChild(btn);
    });
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function formatText(t) {
    return t
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
